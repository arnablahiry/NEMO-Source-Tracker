name: Deploy nemo docs to user Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Copy assets into docs/_static
        run: |
          mkdir -p docs/_static
          cp assets/nemo_ico.png docs/_static/nemo_ico.png

      - name: Build Sphinx docs
        run: |
          python -c "import sphinx; print('sphinx', sphinx.__version__)"
          sphinx-build -b html docs docs/_build/html -W --keep-going

      - name: Checkout Pages repo
        uses: actions/checkout@v4
        with:
          repository: arnablahiry/arnablahiry.github.io
          token: ${{ secrets.DEPLOY_DOCS }}
          path: pages_repo

      - name: Sync built site to pages repo
        run: |
          mkdir -p pages_repo/software/nemo
          rsync -av --delete docs/_build/html/ pages_repo/software/nemo/
          cd pages_repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add software/nemo
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Auto-deploy nemo docs from ${{ github.sha }}"
            git push origin main
          fi
